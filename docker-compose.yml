version: "3.9"

services:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api
    networks:
      - mindtrace-net

  # ─── API Gateway (FastAPI) ───────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - ML_FACIAL_URL=http://ml-facial:8001
      - ML_SPEECH_URL=http://ml-speech:8002
      - ML_TEXT_URL=http://ml-text:8003
      - ML_MICRO_URL=http://ml-micro:8004
      - SECRET_KEY=mindtrace-dev-secret-change-in-prod
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - model-cache:/root/.cache
    depends_on:
      - redis
      - ml-facial
      - ml-speech
      - ml-text
      - ml-micro
    networks:
      - mindtrace-net

  # ─── ML Services ────────────────────────────────────────────────────────────
  ml-facial:
    build:
      context: ./services/ml-facial
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./services/ml-facial:/app
      - model-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - mindtrace-net

  ml-speech:
    build:
      context: ./services/ml-speech
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./services/ml-speech:/app
      - model-cache:/root/.cache
    networks:
      - mindtrace-net

  ml-text:
    build:
      context: ./services/ml-text
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./services/ml-text:/app
      - model-cache:/root/.cache
    networks:
      - mindtrace-net

  ml-micro:
    build:
      context: ./services/ml-micro
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./services/ml-micro:/app
      - model-cache:/root/.cache
    networks:
      - mindtrace-net

  # ─── Redis (pub/sub + cache) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - mindtrace-net

  # ─── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - mindtrace-net

volumes:
  redis-data:
  model-cache:

networks:
  mindtrace-net:
    driver: bridge
