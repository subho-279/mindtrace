name: MindTrace++ CD — Deploy

on:
  workflow_run:
    workflows: ["MindTrace++ CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/mindtrace' }}

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Writing .env from secrets ──"
            cat > .env << 'EOF'
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ENVIRONMENT=production
            REDIS_URL=redis://redis:6379
            ML_FACIAL_URL=http://ml-facial:8001
            ML_SPEECH_URL=http://ml-speech:8002
            ML_TEXT_URL=http://ml-text:8003
            ML_MICRO_URL=http://ml-micro:8004
            EOF

            echo "── Pulling latest images ──"
            docker compose pull || docker compose build

            echo "── Rolling restart (zero-downtime) ──"
            docker compose up -d --remove-orphans

            echo "── Health checks ──"
            sleep 15
            docker compose ps
            curl -f http://localhost:8000/health || (docker compose logs api --tail=30 && exit 1)

            echo "── Deploy complete ──"
